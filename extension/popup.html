<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 300px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a0a;
    color: #fafaf8;
    padding: 16px;
  }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  label {
    display: block;
    font-size: 11px;
    color: #9a9a9a;
    margin-bottom: 4px;
    letter-spacing: 0.04em;
  }
  input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #2e2e2e;
    border-radius: 4px;
    background: #141414;
    color: #fafaf8;
    font-size: 12px;
    outline: none;
    margin-bottom: 12px;
  }
  input:focus { border-color: #fafaf8; }
  button {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 4px;
    background: #fafaf8;
    color: #0a0a0a;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
  }
  button:hover { background: #e8e8e8; }
  .status {
    margin-top: 10px;
    font-size: 11px;
    color: #166534;
    text-align: center;
    min-height: 16px;
  }
  .hint {
    font-size: 10px;
    color: #6e6e6e;
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>
  <h1>🍪 YT Cookie Sync</h1>
  <label for="server">Server URL</label>
  <input type="url" id="server" placeholder="https://downloader.glassgallery.my.id">
  <button id="save">Save & Sync Now</button>
  <div class="status" id="status"></div>
  <div class="hint">Cookies auto-sync every minute and on any YouTube/Google cookie change.</div>

  <script src="popup.js"></script>
</body>
</html>
