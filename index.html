<style>

<style>
.sr-only {
  position: absolute; width: 1px; height: 1px;
  padding: 0; margin: -1px; overflow: hidden;
  clip: rect(0,0,0,0); border: 0;

<script>
const PLATFORMS = ['youtube','facebook','instagram','tiktok','x','threads'];

const platformIcons = {
  youtube:   'fa-youtube',
  facebook:  'fa-facebook',
  instagram: 'fa-instagram',
  tiktok:    'fa-tiktok',
  x:         'fa-x-twitter',
  threads:   'fa-threads',
};

function detectPlatform(url) {
  const u = url.toLowerCase();
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  if (u.includes('facebook.com') || u.includes('fb.watch') || u.includes('fb.com')) return 'facebook';
  if (u.includes('instagram.com') || u.includes('instagr.am')) return 'instagram';
  if (u.includes('tiktok.com') || u.includes('vm.tiktok')) return 'tiktok';
  if (u.includes('x.com') || u.includes('twitter.com')) return 'x';
  if (u.includes('threads.net') || u.includes('threads.com')) return 'threads';
  return null;
}

function highlightPlatform(name) {
  document.querySelectorAll('.platform-badge').forEach(b => {
    b.classList.remove('active');
    if (name && b.textContent.trim().toLowerCase().includes(name)) b.classList.add('active');
  });
}

const urlInput  = document.getElementById('urlInput');
const clearBtn  = document.getElementById('clearBtn');
const fetchBtn  = document.getElementById('fetchBtn');
const form      = document.getElementById('downloadForm');
const resultCard = document.getElementById('resultCard');
const thumb     = document.getElementById('thumb');
const titleEl   = document.getElementById('title');
const platformLabel = document.getElementById('platformLabel');
const durationEl = document.getElementById('duration');
const resolutionEl = document.getElementById('resolution');
const resSelector  = document.getElementById('resSelector');
const formatSection = document.getElementById('formatSection');
const actions   = document.getElementById('actions');
const statusMsg = document.getElementById('statusMsg');

let selectedFormatId = null;

function toggleClearBtn() {
  clearBtn.style.display = urlInput.value ? 'flex' : 'none';
}
urlInput.addEventListener('input', () => {
  highlightPlatform(detectPlatform(urlInput.value));
  toggleClearBtn();
});
clearBtn.addEventListener('click', () => {
  urlInput.value = '';
  toggleClearBtn();
  highlightPlatform(null);
  resultCard.classList.remove('visible');
  setStatus('', '');
  urlInput.focus();
});
form.addEventListener('submit', e => { e.preventDefault(); fetchMedia(); });
toggleClearBtn();

async function fetchMedia() {
  const url = urlInput.value.trim();
  if (!url) { setStatus('Paste a link first.', 'error', 'fa-circle-exclamation'); return; }

  const platform = detectPlatform(url);
  if (!platform) {
    setStatus('Unsupported platform — try YouTube, Instagram, TikTok, X, or Threads.', 'error', 'fa-circle-exclamation');
    return;
  }

  setStatus('', '');
  fetchBtn.disabled = true;
  fetchBtn.classList.add('loading');
  resultCard.classList.remove('visible');

  let apiUrl = url;
  if (platform === 'threads') apiUrl = apiUrl.replace(/threads\.com/i, 'threads.net');

  try {
    const res = await fetch('/api/info', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url: apiUrl })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error (${res.status})`);
    }
    const data = await res.json();

    thumb.src = data.thumbnail || '';
    thumb.alt = data.title ? `Thumbnail for ${data.title}` : 'Media thumbnail';
    titleEl.textContent = data.title || 'Untitled';
    titleEl.title = data.title || '';
    platformLabel.textContent = platform.charAt(0).toUpperCase() + platform.slice(1);
    durationEl.textContent = data.duration ? formatDuration(data.duration) : '';
    resolutionEl.textContent = data.resolution || '';

    buildResSelector(data.formats || []);
    selectedFormatId = null;

    actions.querySelectorAll('.dl-btn').forEach(btn => {
      btn.onclick = () => downloadMedia(url, btn.dataset.type, data);
    });

    resultCard.classList.add('visible');
    setStatus('Ready to download.', 'success', 'fa-circle-check');
  } catch (err) {
    setStatus(err.message || 'Failed to fetch media info.', 'error', 'fa-circle-exclamation');
  } finally {
    fetchBtn.disabled = false;
    fetchBtn.classList.remove('loading');
  }
}

function buildResSelector(formats) {
  resSelector.innerHTML = '';
  const seen = new Set();
  const chips = formats.filter(f => {
    if (f.resolution === 'audio' || seen.has(f.resolution)) return false;
    seen.add(f.resolution);
    return true;
  });

  if (chips.length === 0) { formatSection.hidden = true; return; }

  formatSection.hidden = false;
  chips.forEach(f => {
    const el = document.createElement('button');
    el.type = 'button';
    el.className = 'res-chip' + (f.resolution === 'audio' ? ' audio-only' : '');
    el.textContent = f.resolution;
    el.dataset.formatId = f.format_id;
    el.setAttribute('aria-pressed', 'false');
    el.addEventListener('click', () => {
      resSelector.querySelectorAll('.res-chip').forEach(c => {
        c.classList.remove('selected');
        c.setAttribute('aria-pressed', 'false');
      });
      el.classList.add('selected');
      el.setAttribute('aria-pressed', 'true');
      selectedFormatId = f.format_id;
    });
    resSelector.appendChild(el);
  });
}

async function downloadMedia(url, type, info) {
  setStatus('Starting download…', '', 'fa-circle-notch fa-spin');
  let dlUrl = url;
  if (detectPlatform(url) === 'threads') dlUrl = dlUrl.replace(/threads\.com/i, 'threads.net');
  const body = { url: dlUrl, type, filename: info.title || '' };
  if (type === 'video' && selectedFormatId) body.format_id = selectedFormatId;
  try {
    const res = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Download failed (${res.status})`);
    }
    const blob = await res.blob();
    const cd = res.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="?(.+?)"?$/);
    const filename = match ? match[1] : `${info.title || 'download'}.${type === 'audio' ? 'mp3' : 'mp4'}`;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    setStatus('Download complete.', 'success', 'fa-circle-check');
  } catch (err) {
    setStatus(err.message || 'Download failed.', 'error', 'fa-circle-exclamation');
  }
}

function formatDuration(s) {
  if (!s) return '';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

function setStatus(msg, type, icon) {
  statusMsg.innerHTML = msg
    ? `<i class="fa-solid ${icon || 'fa-circle-info'}" aria-hidden="true"></i> ${msg}`
    : '';
  statusMsg.className = 'status-bar' + (type ? ' ' + type : '');
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Handle shared URL from share target
(function() {
  const params = new URLSearchParams(window.location.search);
  const sharedUrl = params.get('url') || params.get('text');
  if (sharedUrl && sharedUrl.match(/^https?:\/\//)) {
    urlInput.value = sharedUrl;
    highlightPlatform(detectPlatform(sharedUrl));
    toggleClearBtn();
    history.replaceState(null, '', '/');
    fetchMedia();
  }
})();
</script>
